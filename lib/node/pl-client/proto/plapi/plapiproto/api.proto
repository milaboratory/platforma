message LocksAPI {
  message LockFieldValues {
    message Create {
      message Request {
        uint64 resource_id = 1; // resource ID that will own the lock
        repeated string lock_references_of = 2; // list of fields whose values should be locked
        string comment = 3; // comment to show for other lockers on lock conflict. Truncated to 1024 bytes.
      }

      message Response {
        // true when lock was acquired (new, or already owned by the owner)
        // Client MUST pay attention to this flag, as it shows if lock was successful.
        bool acquired = 1;

        // Info about why lock was not acquired.
        // Limited number of conflicts is reported: i.e. if lock operation failed for 20 fields, only first 10 are listed here.
        // The number '10' is not a fixed contract for external clients. It is just 'somehow truncated'.
        repeated LockInfo conflicting_locks = 2;
        bool conflicts_list_truncated = 3; // true if there were more conflicts than reported

        message LockInfo {
          uint64 target_id = 1; // ID of resource that failed to be locked
          string field_name = 2; // what field was referencing this <target_id>

          uint64 locked_by = 3; // Who is owning the lock for <target_id>
          google.protobuf.Timestamp locked_at = 4; // when the lock was obtained
          string comment = 5; // comment from the locker holding the lock
        }
      }
    }
  }

  message Lease {
    message Create {
      message Request {
        uint64 resource_id = 1;
        bytes resource_signature = 5;

        google.protobuf.Duration timeout = 3;
        string name = 4;
      }
      message Response {
        bytes lease_id = 1;
      }
    }

    message Update {
      message Request {
        uint64 resource_id = 1;
        bytes resource_signature = 5;

        bytes lease_id = 2;
        google.protobuf.Duration timeout = 3;
        string name = 4;
      }
      message Response {}
    }

    message Release {
      message Request {
        uint64 resource_id = 1;
        bytes resource_signature = 3;

        bytes lease_id = 2;
      }
      message Response {}
    }
  }
}

message AuthAPI {
  message ListMethods {
    message Request {}

    message Response {
      repeated MethodInfo methods = 1;
    }

    message MethodInfo {
      string type = 1;
      string name = 2;
      map<string, string> info = 3;
    }
  }

  message GetJWTToken {
    enum Role {
      ROLE_UNSPECIFIED = 0; // issue JWT with caller's natural role
      USER = 1;
      CONTROLLER = 2;
      WORKFLOW = 3;
    }

    message Request {
      google.protobuf.Duration expiration = 1;
      optional Role requested_role = 2;
    }

    message Response {
      string token = 1;
      bytes session_id = 2;
    }
  }

  message GrantAccess {
    message Request {
      uint64 resource_id = 1;
      bytes resource_signature = 2;
      string target_user = 3;        // user login to grant access to
      Grant.Permissions permissions = 4;   // access level to grant
    }

    message Response {}
  }

  message RevokeGrant {
    message Request {
      uint64 resource_id = 1;
      bytes resource_signature = 2;
      string target_user = 3; // user login whose grant to revoke
    }

    message Response {}
  }

  message ListGrants {
    message Request {
      uint64 resource_id = 1;
      bytes resource_signature = 2;
    }

    message Response {
      Grant grant = 1; // one per stream message
    }
  }

  message Grant {
    // Permissions describes access level for a grant.
    message Permissions {
      bool writable = 1; // write access = ability to modify resource tree + share access
    }

    string user = 1;
    uint64 resource_id = 2;
    Permissions permissions = 3; // access level from grant table
    string granted_by = 4;      // login of the user who created this grant
    int64 granted_at = 5;       // unix timestamp in milliseconds
  }

  message ListUserResources {
    message Request {
      // User login to list resources for.
      // Is ignored for regular user role: it can list only its own resources.
      string login = 1;

      // Start listing shared resources from given resource ID.
      // User root is returned only on the first page (when start_from == 0).
      uint64 start_from = 2;

      // Non-zero value limits total resource count to at most <limit>.
      // limit = 1 with start_from = 0 returns solely user's root
      // limit = 2 with non-zero start_from returns 2 shared resources.
      // Zero returns all resources.
      uint32 limit = 3;
    }

    // Multi-message: first message contains UserRoot (only when start_from == 0),
    message Response {
      oneof entry {
        UserRoot user_root = 1;
        SharedResource shared_resource = 2;
      }

      // Set only on the last message when limit > 0 and more items exist.
      // Use as 'start_from' in the next request to continue listing.
      uint64 next_resource_id = 3;
    }

    message UserRoot {
      uint64 resource_id = 1;
      bytes resource_signature = 2;
    }

    message SharedResource {
      uint64 resource_id = 1;
      bytes resource_signature = 2;
      Base.ResourceType resource_type = 3;
      Grant.Permissions permissions = 4;
    }
  }
}

message MiscAPI {
  message ListResourceTypes {
    message Request {}

