syntax = "proto3";

package MiLaboratories.PL.API;

import "github.com/milaboratory/pl/plapi/plapiproto/base_types.proto";
import "github.com/milaboratory/pl/plapi/plapiproto/resource_types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/milaboratory/pl/plapi/plapiproto;plapiproto";

message Tx {
  bool is_valid = 1;
  uint64 id = 2;
}

message Resource {
  enum Kind {
    KIND_INVALID = 0;
    KIND_STRUCTURAL = 1;
    KIND_VALUE = 2;
  }

  uint64 resource_id = 2;
  bytes resource_signature = 18;
  bytes canonical_id = 17; // could be empty; it depends on the resource lifecycle state
  Kind kind = 3;
  Base.ResourceType type = 4;
  bytes data = 5;

  message Features {
    bool ephemeral = 1; // false = 'supports deduplication'
  }

  Features features = 16;

  repeated Field fields = 6;

  // Resource has at least one field with error
  bool has_errors = 7;
  bool inputs_locked = 8;
  bool outputs_locked = 9;
  bool resource_ready = 14;
  bool is_final = 15;

  uint64 original_resource_id = 10;
  uint64 parent_resource_id = 11;

  google.protobuf.Timestamp created_time = 12;
  google.protobuf.Timestamp deleted_time = 13;

  // next free: 19
}

message Field {
  // field ID is always combination of parent resource ID and field name
  Base.FieldRef id = 1;
  Base.FieldType type = 2;
  Resource.Features features = 3;

  // _resolved_ value of a field or _assigned_ if the field was assigned to a resource.
  // If a field refers to another field, it will get
  // a value only when this chain of references ends up with a direct resource
  // reference. At that moment, all fields in the chain will get their values
  // resolved and will start to refer to the same resource directly.
  uint64 value = 5;
  // Signature for value resource ID, inheriting the parent resource's color.
  // Populated server-side when the parent resource has a known color in the current TX.
  bytes value_signature = 10;

  enum ValueStatus {
    INVALID = 0;
    EMPTY = 1;
    ASSIGNED = 2;
    RESOLVED = 3;
  }

  // Whether the value is empty, assigned, or finally resolved.
  ValueStatus value_status = 7;

  // If the value is in its final state (ready, duplicate or error)
  bool value_is_final = 8;

  // Error resource ID, if any.
  // Is intended to report problems _from_ the platform to the client.
  uint64 error = 6;
  // Signature for error resource ID, inheriting the parent resource's color.
  bytes error_signature = 11;
}

message Notification {
  message Events {
    bool resource_created = 1;
    bool resource_deleted = 2;

    bool resource_ready = 4;
    bool resource_duplicate = 5;
    bool resource_error = 15;

    bool inputs_locked = 12;
    bool outputs_locked = 13;

    bool field_created = 11;
    bool field_got_error = 16;
    bool input_set = 6;
    bool all_inputs_set = 7;
    bool output_set = 8;
    bool all_outputs_set = 9;

    bool generic_otw_set = 14;
    bool dynamic_changed = 10;

    bool resource_recovered = 17;

    // next free: 18;
  }

  message FieldChange {
    Field old = 1;
    Field new = 2;
  }

  uint64 subscription_id = 1;
  uint64 event_id = 2;

  uint64 resource_id = 3;
  Base.ResourceType resource_type = 4;

  Events events = 5;
  map<string, FieldChange> field_changes = 6;

  RTypes.NotificationFilter.Payload payload = 7;
  string filter_name = 8;

  SpanInfo tx_span = 9;
}

message SpanInfo {
  string path = 1;
  map<string, string> carrier = 2;
}

message Subscription {
  uint64 id = 1;
  bool blocking = 3;
}

message Controller {
  string type = 1;
  uint64 id = 2;
  uint64 subscriptionID = 3;
}

message ResourceSchema {
  Base.ResourceType type = 1;

  repeated FieldSchema fields = 2;

  message AccessFlags {
    // Deny-list approach: default = allowed (true)
    // Controllers set these to false to restrict non-controller roles (role='u', role='w')
    optional bool create_resource = 1;  // default: true (creation allowed)

    // IMPORTANT: read_fields=false with write_fields=true is a forbidden combination
    optional bool read_fields = 2;    // default: true (reads allowed)
    optional bool write_fields = 3;   // default: true (writes allowed)

    // IMPORTANT: read_kv=false with write_kv=true is a forbidden combination
    optional bool read_kv = 4;   // if unset, falls back to read_fields
    optional bool write_kv = 5;  // if unset, falls back to write_fields

    // Per-field-type overrides (map: field_type → bool)
    // When defined for a field type, overrides resource-level flags
    map<uint32, bool> read_by_field_type = 6;
    map<uint32, bool> write_by_field_type = 7;
  }

  // Access restriction flags for non-controller roles
  optional AccessFlags access_flags = 3;

  bool free_inputs = 4;   // if true, skip automatic input locking on creation
  bool free_outputs = 5;  // if true, skip automatic output locking on creation
}

message FieldSchema {
  Base.FieldType type = 1;
  string name = 2;
}

message ResourceAPIFeature {
  string controller_type = 1;
  string feature_name = 2;
  Base.ResourceType resource_type = 3;
  string endpoint = 4;
}
