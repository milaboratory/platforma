license:
  value: ""
  file: ""

logging:
  level: "info"
  destinations:
    - type: "file"
      path: "platforma.log"

monitoring:
  listen: "127.0.0.1:11235"

debug:
  listen: "127.0.0.1:11236"

core:
  logging:
    extendedInfo: true
    dumpResourceData: true

  tls:
    enabled: false
  grpc:
    listen: "127.0.0.1:11234"
  http:
    listen: "127.0.0.1:11233"

  authEnabled: true
  auth:
    - driver: jwt
      key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    - driver: htpasswd
      path: "users.htpasswd"
  db:
    path: "./db"

controllers:
  data:
    main:
      storages:
        main:
          mode: primary
          downloadable: true

        work:
          mode: active
          downloadable: false

    storages:
      - id: "main"
        type: "FS"
        indexCachePeriod: "1m"
        rootPath: "./storages/main"

      - id: "work"
        type: "FS"
        indexCachePeriod: "1m"
        rootPath: "./storages/work"

  runner:
    type: local
    resources:
      cpu: 5
    storageRoot: "./storages/work"

  packageLoader:
    packagesRoot: "./packages"

  workflows: {}
