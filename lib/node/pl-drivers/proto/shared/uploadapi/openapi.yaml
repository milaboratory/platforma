openapi: 3.0.3
info:
  title: Upload API
  description: Upload provides access to the data upload feature, allowing clients to upload data to Platforma.
  version: 0.0.1
paths:
  /v1/upload/finalize:
    post:
      tags:
        - Upload
      description: |-
        Finalize informs the Controller that the upload process is done.
         Returns an error if the total size of all uploaded chunks is not equal to
         the size of the upload given in Init.
      operationId: Upload_Finalize
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Finalize_Request"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finalize_Response"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /v1/upload/get-part-url:
    post:
      tags:
        - Upload
      description: |-
        GetPartURL provides a URL for uploading a chunk of the data.
         Clients are expected to put their data directly to the given location.
      operationId: Upload_GetPartURL
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetPartURL_Request"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPartURL_Response"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /v1/upload/init:
    post:
      tags:
        - Upload
      description: Initialize the upload, making the controller do all required preparation steps.
      operationId: Upload_Init
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Init_Request"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Init_Response"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /v1/upload/reset:
    post:
      tags:
        - Upload
      description: |-
        Reset the current upload progress (remove uploaded parts and so on) to start over.
         This is useful when a checksum mismatch is detected by the client during upload
         and the data requires a full re-upload.
         The server never resets the upload on its own; it is always the client's initiative.
      operationId: Upload_Reset
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Reset_Request"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reset_Response"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /v1/upload/update-progress:
    post:
      tags:
        - Upload
      description: Update the progress of the upload, so other clients can see how it is going.
      operationId: Upload_UpdateProgress
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProgress_Request"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProgress_Response"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
components:
  schemas:
    Finalize_Request:
      type: object
      properties:
        resourceId:
          type: string
        resourceSignature:
          type: string
          description: Signature proving the caller is authorized to access this resource.
          format: bytes
        checksumAlgorithm:
          type: integer
          description: |-
            The client can send the final checksum of the whole file to verify the upload.
             The algorithm used to calculate this final checksum must match the algorithm from
             Init.Response. The server may reject the request on a mismatch
             (meaning the server does not support the given algorithm).
          format: enum
        checksum:
          type: string
          description: |-
            Checksum of the whole file for validation. When provided, the server may verify the upload before
             marking it final. This is optional behavior that depends on the particular storage driver
             used on the backend side for this upload. See the storage driver's implementation for more details.
          format: bytes
    Finalize_Response:
      type: object
      properties: {}
    GetPartURL_HTTPHeader:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
    GetPartURL_Request:
      type: object
      properties:
        resourceId:
          type: string
          description: ID of the upload resource
        resourceSignature:
          type: string
          description: Signature proving the caller is authorized to access this resource.
          format: bytes
        partNumber:
          type: string
          description: |-
            Part to be uploaded. It is the responsibility of the client to keep track of already uploaded parts:
             - client can request a URL for the same part twice (request -> request) without errors;
             - client can request a URL for an already uploaded part (request -> upload -> request) without errors.

             Parts enumeration starts from 1.
        uploadedPartSize:
          type: string
          description: |-
            Size of the part uploaded by the client earlier. Allows the controller to count upload progress
             based on the client's input.
             The client is free to never send this value (send zeroes in each request).
        isInternalUse:
          type: boolean
          description: |-
            Whether to presign the URL for internal use.
             Controllers could use this if they are trying to upload something from the internal network.
             For backward compatibility, by default the pl backend will presign external URLs.
        partChecksum:
          type: string
          description: |-
            Checksum is not used for now, but it is here for the case
             where signing the checksum header is required.
    GetPartURL_Response:
      type: object
      properties:
        uploadUrl:
          type: string
          description: URL for chunk upload
        method:
          type: string
          description: HTTP method to use for chunk upload, say 'PUT' or 'POST'.
        headers:
          type: array
          items:
            $ref: "#/components/schemas/GetPartURL_HTTPHeader"
          description: |-
            List of headers with their values that MUST be sent by the client for the upload.
             The destination service (the one that will handle the upload request for a specific part)
             may reject the request if it does not include the given headers.
        chunkStart:
          type: string
          description: |-
            The number of the _first_ byte in the chunk.
             Absolute position from the start of the file ( file.seek(<chunk_start>, SEEK_START) ).
             The client is expected to send the [<chunk_start>; <chunk_end>) range.
        chunkEnd:
          type: string
          description: |-
            The number of the byte _after_ the last to be sent in the chunk.
             Absolute position from the start of the file.
             The client is expected to send the [<chunk_start>; <chunk_end>) range.
    GoogleProtobufAny:
      type: object
      properties:
